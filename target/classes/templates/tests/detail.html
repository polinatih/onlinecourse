<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title th:text="${test.title}">Тест</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f8f9fa;}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CoursePlatform</a>
        <a class="nav-link text-white" th:href="@{/courses/{id}(id=${test.course.id})}">← К курсу</a>
    </div>
</nav>
<div class="container">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 mb-4" style="border:none;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:12px;">
                <h3 class="fw-bold" th:text="${test.title}"></h3>
<a th:href="@{/attempt/{id}(id=${test.id})}"
   class="btn btn-success mt-3">
    Пройти тест
</a>
                <div class="d-flex gap-3 mt-2 text-muted small">
                    <span><i class="bi bi-clock me-1"></i><span th:text="${test.timeLimitMinutes}"></span> мин.</span>
                    <span><i class="bi bi-check2-circle me-1"></i>Балл: <span th:text="${test.passingScore}"></span></span>
                    <span><i class="bi bi-arrow-repeat me-1"></i>Попыток: <span th:text="${test.maxAttempts}"></span></span>
                </div>
            </div>
            <div class="card p-4" style="border:none;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:12px;">
                <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold mb-0">
        <i class="bi bi-question-circle me-2 text-primary"></i>
        Вопросы (<span th:text="${#lists.size(test.questions)}"></span>)
    </h5>
    <a th:href="@{/questions/add(testId=${test.id})}" class="btn btn-sm btn-success">
        ➕ Добавить вопрос
    </a>
</div>
                <div th:each="q, stat : ${test.questions}" class="border rounded p-3 mb-2">
    <div class="d-flex justify-content-between align-items-start">
        <div>
            <span class="badge bg-secondary me-2" th:text="${stat.index + 1}"></span>
            <span th:text="${q.text}"></span>
        </div>
        <div class="d-flex gap-1 align-items-center">
            <span class="badge bg-light text-dark border" th:text="${q.questionType}"></span>
            <span class="badge bg-warning text-dark" th:text="${q.points} + 'б.'"></span>
            <span class="badge bg-info text-dark" th:text="'сл.' + ${q.difficultyScore}"></span>
            <a th:href="@{/questions/{id}/edit(id=${q.id}, testId=${test.id})}"
               class="btn btn-outline-secondary btn-sm">✏️</a>
            <form th:action="@{/questions/{id}/delete(id=${q.id})}" method="post" class="d-inline">
                <input type="hidden" name="testId" th:value="${test.id}"/>
                <button type="submit" class="btn btn-outline-danger btn-sm"
                        onclick="return confirm('Удалить вопрос?')">🗑️</button>
            </form>
        </div>
    </div>
                    <div th:if="${q.answerOptions != null}" class="mt-2 small text-muted">
                        Варианты: <span th:text="${q.answerOptions}"></span>
                    </div>
                </div>
            </div>
        </div>
        <!-- Prototype panel -->
        <div class="col-lg-4">
            <div class="card p-3" style="border:none;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:12px;">
                <h6 class="fw-bold">📋 Клонировать вопрос
                    <span class="badge ms-1" style="background:#6f42c1;font-size:.65rem;">Prototype</span>
                </h6>
                <p class="small text-muted">Создаёт независимую копию из реестра прототипов.</p>
                <div th:if="${#lists.isEmpty(prototypes)}" class="text-muted small text-center py-2">
                    Прототипов нет. Создайте тест чтобы зарегистрировать их.
                </div>
                <form th:unless="${#lists.isEmpty(prototypes)}"
                      th:action="@{/tests/{id}/clone-question(id=${test.id})}" method="post">
                    <select name="prototypeKey" class="form-select form-select-sm mb-2">
                        <option th:each="k : ${prototypes}" th:value="${k}" th:text="${k}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm w-100" style="background:#6f42c1;color:white;">
                        <i class="bi bi-files me-1"></i>Клонировать
                    </button>
                </form>
            </div>
            <div class="card p-3 mt-3 text-center" style="border:none;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:12px;">
                <div class="display-6 fw-bold text-primary" th:text="${#lists.size(test.questions)}">0</div>
                <div class="text-muted small">Вопросов</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
