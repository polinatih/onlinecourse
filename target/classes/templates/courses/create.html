<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Создать курс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f8f9fa;}
        .extra{display:none;}
        .pattern-info{background:#f0f4ff;border-left:4px solid #6f42c1;border-radius:0 8px 8px 0;padding:12px 16px;}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-mortarboard-fill me-2"></i>CoursePlatform</a>
        <a class="nav-link text-white" href="/courses">← Все курсы</a>
    </div>
</nav>
<div class="container" style="max-width:720px;">
    <h2 class="fw-bold mb-1"><i class="bi bi-plus-circle me-2 text-primary"></i>Создать курс</h2>
    <div class="pattern-info mb-4 small">
        <strong>🏭 Factory Method</strong> — выбор типа курса определяет какой Creator создаст объект:
        <code>VideoCourse</code>, <code>TextCourse</code> или <code>InteractiveCourse</code>.
    </div>
    <div class="card p-4">
        <form action="/courses/create" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Тип курса</label>
                <select name="courseType" id="courseType" class="form-select" onchange="toggleFields()" required>
                    <option value="">— Выберите тип —</option>
                    <option value="videoCourseCreator">🎬 Видеокурс</option>
                    <option value="textCourseCreator">📄 Текстовый курс</option>
                    <option value="interactiveCourseCreator">💻 Интерактивный курс</option>
                </select>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Название</label>
                    <input type="text" name="title" class="form-control" required placeholder="Введите название"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Длительность (ч.)</label>
                    <input type="number" name="durationHours" class="form-control" min="1" required placeholder="20"/>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Описание</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Автор</label>
                    <input type="text" name="author" class="form-control" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Уровень сложности</label>
                    <select name="difficultyLevel" class="form-select" required>
                        <option th:each="lv : ${difficultyLevels}" th:value="${lv}" th:text="${lv}"></option>
                    </select>
                </div>
            </div>
            <!-- Видеокурс -->
            <div id="videoFields" class="extra card bg-light p-3 mb-3">
                <h6 class="text-primary mb-2">🎬 Параметры видеокурса</h6>
                <div class="row g-2">
                    <div class="col-md-8">
                        <input type="text" name="videoUrl" class="form-control form-control-sm" placeholder="URL видео"/>
                    </div>
                    <div class="col-md-4">
                        <input type="number" name="videoDurationMinutes" class="form-control form-control-sm" placeholder="Длительность (мин)"/>
                    </div>
                </div>
            </div>
            <!-- Текстовый курс -->
            <div id="textFields" class="extra card bg-light p-3 mb-3">
                <h6 class="text-success mb-2">📄 Параметры текстового курса</h6>
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="number" name="articleCount" class="form-control form-control-sm" placeholder="Кол-во статей"/>
                    </div>
                    <div class="col-md-8">
                        <input type="text" name="pdfUrl" class="form-control form-control-sm" placeholder="URL PDF"/>
                    </div>
                </div>
            </div>
            <!-- Интерактивный курс -->
            <div id="interactiveFields" class="extra card bg-light p-3 mb-3">
                <h6 class="text-warning mb-2">💻 Параметры интерактивного курса</h6>
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="number" name="taskCount" class="form-control form-control-sm" placeholder="Кол-во заданий"/>
                    </div>
                    <div class="col-md-6 d-flex align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="hasSimulator" value="true" id="sim"/>
                            <label class="form-check-label" for="sim">Есть симулятор</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-circle me-1"></i>Создать
                </button>
                <a href="/courses" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
<script>
function toggleFields() {
    const t = document.getElementById('courseType').value;
    document.getElementById('videoFields').style.display       = t === 'videoCourseCreator'       ? 'block' : 'none';
    document.getElementById('textFields').style.display        = t === 'textCourseCreator'        ? 'block' : 'none';
    document.getElementById('interactiveFields').style.display = t === 'interactiveCourseCreator' ? 'block' : 'none';
}
</script>
</body>
</html>
