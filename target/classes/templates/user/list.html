<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Пользователи — CoursePlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:#f4f6fb; }
        .card { border:none; border-radius:16px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
        .avatar-sm { width:40px; height:40px; border-radius:50%;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex; align-items:center; justify-content:center;
            color:white; font-weight:700; font-size:.9rem; flex-shrink:0; }
        .session-dot { width:8px; height:8px; border-radius:50%; background:#28a745; display:inline-block; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:linear-gradient(135deg,#667eea,#764ba2);">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-mortarboard-fill me-2"></i>CoursePlatform</a>
        <div class="d-flex gap-2">
            <a href="/courses" class="btn btn-outline-light btn-sm">Курсы</a>
            <a href="/register" class="btn btn-light btn-sm">+ Добавить</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>Пользователи</h3>
        <div class="small text-muted">
            <span class="session-dot me-1"></span>
            Активных сессий (Singleton): <strong th:text="${activeSessions}"></strong>
        </div>
    </div>

    <div class="card">
        <div th:if="${users.isEmpty()}" class="text-center text-muted p-5">
            <i class="bi bi-people" style="font-size:2.5rem;"></i>
            <p class="mt-2">Пользователей нет. <a href="/register">Зарегистрировать первого</a></p>
        </div>
        <div th:each="u,it : ${users}"
             th:classappend="${!it.last} ? 'border-bottom' : ''"
             class="d-flex align-items-center gap-3 p-3">
            <div class="avatar-sm"
                 th:text="${u.fullName != null ? #strings.substring(u.fullName,0,1) : #strings.substring(u.username,0,1)}">А</div>
            <div class="flex-grow-1">
                <div class="fw-semibold" th:text="${u.fullName != null ? u.fullName : u.username}"></div>
                <div class="small text-muted" th:text="'@' + ${u.username} + ' · ' + ${u.email}"></div>
            </div>
            <div>
                <span class="badge"
                      th:classappend="${u.role.name() == 'INSTRUCTOR'} ? 'bg-warning text-dark' : 'bg-primary'"
                      th:text="${u.role.name() == 'INSTRUCTOR'} ? '👨‍🏫 Преподаватель' : '👩‍🎓 Студент'"></span>
                <div class="small text-muted text-end mt-1" th:text="${u.enrolledCourses.size()} + ' курс(ов)'"></div>
            </div>
            <a th:href="@{/profile/{id}(id=${u.id})}" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-person"></i> Профиль
            </a>
        </div>
    </div>
</div>
</body>
</html>
