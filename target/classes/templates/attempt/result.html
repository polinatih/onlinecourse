<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Результат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body{background:#f8f9fa;}
        .result-card{border:none;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:16px;}
        .score-circle{width:140px;height:140px;border-radius:50%;display:flex;
                      align-items:center;justify-content:center;font-size:2rem;
                      font-weight:bold;margin:0 auto;}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CoursePlatform</a>
    </div>
</nav>
<div class="container" style="max-width:640px;">

    <!-- Результат -->
    <div class="card result-card p-5 text-center mb-4">
        <div class="score-circle mb-3"
             th:classappend="${passed} ? 'bg-success text-white' : 'bg-danger text-white'">
            <span th:text="${percentage} + '%'"></span>
        </div>

        <h2 class="fw-bold mt-3"
            th:text="${passed} ? '🎉 Тест пройден!' : '😔 Тест не пройден'"></h2>
        <p class="text-muted" th:text="${test.title}"></p>

        <div class="row g-3 mt-2">
            <div class="col-4">
                <div class="bg-light rounded p-3">
                    <div class="small text-muted">Правильных</div>
                    <div class="fw-bold fs-4 text-success"
                         th:text="${correctCount} + '/' + ${totalCount}"></div>
                </div>
            </div>
            <div class="col-4">
                <div class="bg-light rounded p-3">
                    <div class="small text-muted">Баллов</div>
                    <div class="fw-bold fs-4 text-primary"
                         th:text="${earnedPoints} + '/' + ${totalPoints}"></div>
                </div>
            </div>
            <div class="col-4">
                <div class="bg-light rounded p-3">
                    <div class="small text-muted">Проходной</div>
                    <div class="fw-bold fs-4" th:text="${test.passingScore} + '%'"></div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-center mt-4">
            <a th:href="@{/attempt/{id}(id=${test.id})}"
               class="btn btn-outline-primary">🔄 Пройти снова</a>
            <a th:href="@{/courses/{id}(id=${test.course.id})}"
               class="btn btn-primary">← К курсу</a>
        </div>
    </div>
</div>
</body>
</html>
