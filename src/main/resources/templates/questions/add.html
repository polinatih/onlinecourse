<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Добавить вопрос</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>body{background:#f8f9fa;}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CoursePlatform</a>
        <a class="nav-link text-white" th:href="@{/tests/{id}(id=${test.id})}">← Назад к тесту</a>
    </div>
</nav>
<div class="container" style="max-width:640px;">
    <h2 class="fw-bold mb-4">➕ Добавить вопрос</h2>
    <div class="card p-4" style="border:none;box-shadow:0 2px 8px rgba(0,0,0,.08);border-radius:12px;">
        <form action="/questions/add" method="post">
            <input type="hidden" name="testId" th:value="${test.id}"/>

            <div class="mb-3">
                <label class="form-label fw-semibold">Тип вопроса</label>
                <select name="questionType" id="qtype" class="form-select"
                        onchange="toggleOptions()" required>
                    <option th:each="t : ${questionTypes}"
                            th:value="${t}" th:text="${t}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Текст вопроса</label>
                <textarea name="text" class="form-control" rows="3" required></textarea>
            </div>

            <div id="optionsBlock" class="mb-3">
                <label class="form-label fw-semibold">
                    Варианты ответа
                    <small class="text-muted">(через точку с запятой: A;B;C;D)</small>
                </label>
                <input type="text" name="answerOptions" class="form-control"
                       placeholder="Вариант A;Вариант B;Вариант C"/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Правильный ответ</label>
                <input type="text" name="correctAnswer" class="form-control" required/>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Баллы</label>
                    <input type="number" name="points" class="form-control"
                           value="1" min="1" max="10" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Сложность (1-5)</label>
                    <input type="number" name="difficultyScore" class="form-control"
                           value="1" min="1" max="5" required/>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    ➕ Добавить вопрос
                </button>
                <a th:href="@{/tests/{id}(id=${test.id})}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
<script>
function toggleOptions() {
    const type = document.getElementById('qtype').value;
    document.getElementById('optionsBlock').style.display =
        type === 'MULTIPLE_CHOICE' ? 'block' : 'none';
}
toggleOptions();
</script>
</body>
</html>
