<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Вход — CoursePlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; }
        .card { border:none; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .pattern-badge { display:inline-block; background:#f0f4ff; color:#3b5bdb;
            border-radius:20px; padding:3px 12px; font-size:.75rem; }
        .form-control:focus { border-color:#667eea; box-shadow:0 0 0 .2rem rgba(102,126,234,.25); }
        .btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); border:none; }
        .btn-primary:hover { background:linear-gradient(135deg,#5a6fd6,#6a3f97); }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-white" style="font-size:3rem;"></i>
                <h2 class="text-white fw-bold mt-2">CoursePlatform</h2>
            </div>

            <div class="card p-4">
                <div class="text-center mb-3">
                    <h4 class="fw-bold">Вход в систему</h4>
                    <span class="pattern-badge">🔒 Singleton (UserSessionManager)</span>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>

                <form method="post" action="/login">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Имя пользователя</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Введите логин" required/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Введите пароль" required/>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                    </button>
                </form>

                <hr class="my-3"/>

                <div class="text-center small">
                    Нет аккаунта?
                    <a href="/register" class="fw-semibold text-decoration-none">Зарегистрироваться</a>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/" class="text-white-50 small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>На главную
                </a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
