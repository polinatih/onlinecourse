<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Course Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; }
        .hero { background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .chip { display:inline-block; background:#f0f4ff; color:#3b5bdb;
                border-radius:20px; padding:4px 14px; font-size:.8rem; margin:3px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="hero p-5 text-center">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size:4rem;"></i>
                <h1 class="mt-3 fw-bold">Платформа онлайн-курсов</h1>
                <p class="text-muted fs-5">Система с тестированием и аналитикой</p>
                <div class="my-4">
                    <h6 class="text-muted mb-3">Порождающие паттерны:</h6>
                    <span class="chip">🏭 Factory Method</span>
                    <span class="chip">🏗️ Abstract Factory</span>
                    <span class="chip">🔒 Singleton</span>
                    <span class="chip">🔨 Builder</span>
                    <span class="chip">📋 Prototype</span>
                </div>
                <div class="alert alert-info">
                    Курсов в системе: <strong th:text="${courseCount}" class="fs-4 ms-1">0</strong>
                </div>
                <div class="d-flex gap-2 justify-content-center mt-4">
                    <a href="/courses" class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-collection me-2"></i>Все курсы
                    </a>
                    <a href="/courses/create" class="btn btn-outline-primary btn-lg px-5">
                        <i class="bi bi-plus-circle me-2"></i>Создать курс
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
